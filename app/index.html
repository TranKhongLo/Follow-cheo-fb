<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tool Hub</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- QR -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body class="bg-[#0f172a] text-white">

<div class="flex h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-[#020617] border-r border-white/10 p-6 flex flex-col">

    <div class="text-xl font-semibold mb-8">🚀 Tool Hub</div>

    <nav class="space-y-2">
      <div class="menu active" onclick="loadApp('qr', this)">QR Generator</div>
      <div class="menu" onclick="loadApp('text', this)">Text Tools</div>
      <div class="menu" onclick="loadApp('youtube', this)">YouTube</div>
      <div class="menu" onclick="loadApp('merge', this)">PDF Merge</div>
      <div class="menu" onclick="loadApp('split', this)">PDF Split</div>
    </nav>

  </aside>

  <!-- Main -->
  <main class="flex-1 p-10 overflow-auto">

    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-2xl font-semibold">Dashboard</h1>
      <p class="text-white/50 text-sm">All your tools in one place</p>
    </div>

    <!-- Content -->
    <div id="app"></div>

  </main>

</div>

<script src="app.js"></script>
</body>
</html>
