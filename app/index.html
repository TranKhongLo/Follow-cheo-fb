<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tool Hub</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- QR -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen p-4">

<div class="app-container">

  <!-- Header -->
  <header class="header">
    🚀 Tool Hub Mini App
  </header>

  <div class="main">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>Danh mục</h2>

      <div class="menu" onclick="loadApp('youtube')">YouTube Downloader</div>
      <div class="menu" onclick="loadApp('merge')">PDF Merge</div>
      <div class="menu" onclick="loadApp('split')">PDF Split</div>
      <div class="menu" onclick="loadApp('image')">Image Converter</div>
      <div class="menu" onclick="loadApp('text')">Text Tools</div>
      <div class="menu active" onclick="loadApp('qr')">QR Generator</div>
    </aside>

    <!-- Content -->
    <main class="content">
      <div id="app"></div>
    </main>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
