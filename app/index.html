<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tool Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen text-white">

<!-- HEADER -->
<header class="p-4 bg-white/10 backdrop-blur-md shadow-lg">
  <h1 class="text-2xl font-bold">🚀 Tool Hub Mini App</h1>
</header>

<div class="flex h-[calc(100vh-64px)]">

  <!-- SIDEBAR -->
  <aside class="w-64 p-4 bg-white/10 backdrop-blur-lg border-r border-white/20 overflow-auto">
    <h2 class="text-lg font-semibold mb-4">Danh mục</h2>
    <ul class="space-y-2">
      <li onclick="loadApp('youtube')" class="menu">YouTube Downloader</li>
      <li onclick="loadApp('merge')" class="menu">PDF Merge</li>
      <li onclick="loadApp('split')" class="menu">PDF Split</li>
      <li onclick="loadApp('image')" class="menu">Image Converter</li>
      <li onclick="loadApp('text')" class="menu">Text Tools</li>
      <li onclick="loadApp('qr')" class="menu">QR Generator</li>
    </ul>
  </aside>

  <!-- CONTENT -->
  <main class="flex-1 p-6 overflow-auto">
    <div id="app" class="bg-white/10 backdrop-blur-lg rounded-2xl p-6 shadow-xl transition-all"></div>
  </main>

</div>

<script>
function loadApp(type) {
  const app = document.getElementById("app");

  // Reset content
  app.innerHTML = "";

  if (type === "youtube") {
    app.innerHTML = `
      <h2 class="title">YouTube Downloader</h2>
      <input id="yt" placeholder="Dán link YouTube..." class="input"/>
      <button class="btn">Tải xuống</button>
      <p class="note">* Cần backend để chạy thật</p>
    `;
  }

  if (type === "merge") {
    app.innerHTML = `
      <h2 class="title">PDF Merge</h2>
      <input type="file" multiple class="input"/>
      <button class="btn">Nối PDF</button>
      <p class="note">* Cần backend xử lý</p>
    `;
  }

  if (type === "split") {
    app.innerHTML = `
      <h2 class="title">PDF Split</h2>
      <input type="file" class="input"/>
      <button class="btn">Cắt PDF</button>
    `;
  }

  if (type === "image") {
    app.innerHTML = `
      <h2 class="title">Image Converter</h2>
      <input type="file" class="input"/>
      <button class="btn">Convert</button>
    `;
  }

  if (type === "text") {
    app.innerHTML = `
      <h2 class="title">Text Tools</h2>
      <textarea id="text" class="input" placeholder="Nhập text..."></textarea>
      <button class="btn" onclick="toUpper()">Uppercase</button>
    `;
  }

  if (type === "qr") {
    app.innerHTML = `
      <h2 class="title">QR Generator</h2>
      <input id="qrText" placeholder="Nhập nội dung..." class="input"/>
      <button class="btn" onclick="genQR()">Tạo QR</button>
      <canvas id="qrCanvas" class="mt-4 bg-white p-2 rounded"></canvas>
    `;
  }
}

// TEXT TOOL
function toUpper() {
  const input = document.getElementById("text");
  input.value = input.value.toUpperCase();
}

// QR TOOL (CHẠY THẬT)
function genQR() {
  const text = document.getElementById("qrText").value;
  const canvas = document.getElementById("qrCanvas");

  QRCode.toCanvas(canvas, text, function (error) {
    if (error) console.error(error);
  });
}

// default load
loadApp("qr");
</script>

</body>
</html>
